<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#080808;color:#fff}
.hero{
min-height:100vh;
background:linear-gradient(rgba(0,0,0,.75),rgba(90,0,0,.88)),
url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?auto=format&fit=crop&w=1400&q=80');
background-size:cover;background-position:center;
display:flex;align-items:center;justify-content:center;
padding:25px;text-align:center
}
.card{
width:100%;max-width:430px;
background:rgba(0,0,0,.78);
border:2px solid #d6001c;
border-radius:25px;
padding:32px 22px;
box-shadow:0 0 35px #d6001c
}
.logo{
font-size:44px;
font-weight:900;
letter-spacing:1px;
color:#fff
}
.logo span{color:#14e0d1}
h1{font-size:29px;margin:18px 0 10px;color:#fff}
p{font-size:16px;color:#ddd;line-height:1.5;margin-bottom:22px}
.btn{
display:block;
width:100%;
padding:16px;
margin:15px 0;
border-radius:15px;
text-decoration:none;
font-size:20px;
font-weight:800;
color:#fff;
transition:.3s
}
.web{background:#d6001c}
.wa{background:#18b957}
.btn:hover{transform:scale(1.04);opacity:.9}
.features{
margin-top:22px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px
}
.feature{
background:rgba(255,255,255,.08);
padding:12px;
border-radius:12px;
font-size:14px;
border:1px solid rgba(255,255,255,.12)
}
.footer{
margin-top:22px;
font-size:13px;
color:#aaa
}
</style>
</head>

<body>

<div class="hero">
  <div class="card">

    <div class="logo">cricbuzz<span>s</span></div>

    <h1>Cricket Updates & Schedule</h1>
    <p>Daily cricket schedule, match updates and sports information in one place.</p>

    <a class="btn web"
    href="https://cricbuzzs.com/"
    target="_blank"
    onclick="fbq('track','ViewContent');">
    🌐 Open Website
    </a>

    <a class="btn wa"
    href="https://wa.me/919999999999"
    target="_blank"
    onclick="fbq('track','Contact'); fbq('track','Lead');">
    💬 Chat on WhatsApp
    </a>

    <div class="features">
      <div class="feature">🏏 Match Schedule</div>
      <div class="feature">⚡ Live Updates</div>
      <div class="feature">📱 Mobile Friendly</div>
      <div class="feature">🕒 24×7 Support</div>
    </div>

    <div class="footer">
      © 2026 Cricbuzzs • 18+ Responsible Use
    </div>

  </div>
</div>

</body>
</html>
